<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📚 2027 IMGO TF</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1a1a;--bg2:#222222;--bg3:#2a2a2a;--bg4:#323232;--bg5:#3a3a3a;
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.18);--border3:rgba(255,255,255,0.28);
  --text:#f0f0f0;--text2:#c0c0c0;--text3:#888;--text4:#555;
  --accent:#c8f060;--accent2:rgba(200,240,96,0.15);--accent3:rgba(200,240,96,0.08);
  --red:#ff5f5f;--amber:#ffb347;--blue:#6eb5ff;--purple:#b8a5ff;--teal:#5ecfb0;--pink:#ff8fa3;
  --r:10px;--rs:6px;
}
body.light{
  --bg:#f7f7f2;--bg2:#eeeee9;--bg3:#ffffff;--bg4:#f2f2ed;--bg5:#e8e8e3;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--border3:rgba(0,0,0,0.22);
  --text:#1a1a1a;--text2:#444;--text3:#888;--text4:#bbb;
  --accent:#5a8a10;--accent2:rgba(90,138,16,0.1);--accent3:rgba(90,138,16,0.06);
  --red:#d93025;--amber:#c87800;--blue:#1a6fc4;--purple:#6b4fc4;--teal:#1a8a6a;--pink:#c4204a;
}
.theme-btn{font-size:16px;padding:4px 8px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text3);transition:.15s;line-height:1;cursor:pointer}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
button{font-family:'Noto Sans KR',sans-serif;cursor:pointer}
input,select,textarea{font-family:'Noto Sans KR',sans-serif;font-size:14px}

/* ── HEADER ── */
.hdr{border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:200}
.logo{font-weight:700;font-size:15px;color:var(--accent);letter-spacing:.04em}
.hdr-right{display:flex;align-items:center;gap:10px}
.dday{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--accent2);border:1px solid var(--accent);color:var(--accent);padding:3px 12px;border-radius:20px}
.edit-btn{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);color:var(--text3);background:none;transition:.15s}
.edit-btn:hover,.edit-btn.on{border-color:var(--amber);color:var(--amber)}

/* ── NAV ── */
.nav{display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.ntab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.ntab:hover{color:var(--text2)}
.ntab.on{color:var(--accent);border-bottom-color:var(--accent)}

/* ── MAIN ── */
.main{padding:20px 20px 80px;max-width:900px}
.page{display:none}.page.on{display:block}
.sec-title{font-size:11px;font-weight:500;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:14px}

/* ── TERM TABS ── */
.term-tabs{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.ttab{padding:6px 16px;font-size:12px;font-weight:500;border-radius:20px;border:1px solid var(--border2);color:var(--text3);background:none;transition:.15s}
.ttab:hover{border-color:var(--accent);color:var(--accent)}
.ttab.on{background:var(--accent2);border-color:var(--accent);color:var(--accent)}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:22px}
@media(min-width:500px){.stats{grid-template-columns:repeat(4,1fr)}}
.sc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.sc-label{font-size:11px;color:var(--text3);margin-bottom:5px}
.sc-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500}
.sc-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ── CALENDAR ── */
.cal-wrap{margin-bottom:26px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-hd{text-align:center;font-size:11px;color:var(--text3);padding:6px 2px;font-weight:500}
.cc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:6px 5px;min-height:64px}
.cc.today{border-color:var(--accent);background:var(--accent3)}
.cc.sday{border-color:rgba(94,207,176,.3)}
.cc.empty{background:transparent;border-color:transparent}
.cd{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:3px}
.cc.today .cd{color:var(--accent);font-weight:500}
.cc-sub{font-size:9px;color:var(--teal);line-height:1.35}
.cc-time{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text3);margin-top:1px}

/* ── SCHEDULE ── */
.wdiv{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:.05em;padding:8px 0 9px;border-top:1px solid var(--border);margin-bottom:6px}
.wdiv:first-child{border-top:none}
.sr{display:grid;grid-template-columns:auto 1fr auto;align-items:start;gap:10px;padding:9px 12px;border-radius:var(--rs);border:1px solid transparent;transition:.12s}
.sr:hover{background:var(--bg3);border-color:var(--border)}
.sr.today-row{background:var(--accent3);border-color:rgba(200,240,96,.15)}
.sr-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);white-space:nowrap}
.sr-day{font-size:10px;color:var(--text3)}
.sr-sub{font-size:13px;color:var(--text)}
.sr-note{font-size:11px;color:var(--text3)}
.sr-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--teal);white-space:nowrap;text-align:right}
.sr-time.pass{color:var(--text3)}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:7px;vertical-align:middle;flex-shrink:0;margin-top:-1px}
.dot-mon{background:var(--accent)}.dot-wed{background:var(--blue)}.dot-fri{background:var(--purple)}.dot-sun{background:var(--amber)}.dot-sat{background:var(--red)}.dot-else{background:var(--teal)}

/* ── LECTURES ── */
.subj-tabs{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap}
.stab{padding:5px 13px;font-size:12px;border-radius:20px;border:1px solid var(--border2);color:var(--text3);background:none;transition:.12s}
.stab:hover{border-color:var(--blue);color:var(--blue)}
.stab.on{background:rgba(110,181,255,.1);border-color:var(--blue);color:var(--blue)}
.lec-list{display:grid;grid-template-columns:1fr;gap:5px}
@media(min-width:560px){.lec-list{grid-template-columns:repeat(2,1fr)}}
.li{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);transition:.12s}
.li:hover{border-color:var(--border2)}
.li.old{opacity:.5}
.li.old .lnum{color:var(--text4)}
.lnum{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);white-space:nowrap;padding-top:2px;min-width:34px}
.ltitle{font-size:12px;color:var(--text2);line-height:1.5}
.old-badge{font-size:9px;background:rgba(255,179,71,.12);color:var(--amber);border:1px solid rgba(255,179,71,.25);padding:1px 6px;border-radius:10px;margin-left:6px;white-space:nowrap;vertical-align:middle}

/* ── NOTICE ── */
.nc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px}
.nc-stitle{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;font-weight:500}
.nr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.nr:last-child{border-bottom:none;padding-bottom:0}
.nl{color:var(--text2)}.nv{font-weight:500}.nv.a{color:var(--accent)}
.fine-row{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--bg4);border-radius:var(--rs);margin-bottom:5px}
.fine-icon{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px}
.fine-name{font-size:13px;flex:1}.fine-amt{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500}
.link-card{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);text-decoration:none;transition:.15s;margin-bottom:7px}
.link-card:hover{border-color:var(--accent)}
.link-title{font-size:13px;color:var(--text)}.link-url{font-size:11px;color:var(--text3);margin-top:1px;font-family:'JetBrains Mono',monospace}
.link-arr{color:var(--text3);margin-left:auto;font-size:16px}

/* ── EDIT MODE PANEL ── */
.edit-panel{background:var(--bg2);border:1px solid rgba(255,179,71,.25);border-radius:var(--r);padding:18px;margin-bottom:18px}
.ep-title{font-size:12px;color:var(--amber);font-weight:500;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.ep-title::before{content:'✏️';font-size:14px}
.ep-tabs{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.eptab{padding:5px 13px;font-size:12px;border-radius:20px;border:1px solid var(--border2);color:var(--text3);background:none;transition:.12s}
.eptab:hover{border-color:var(--amber);color:var(--amber)}
.eptab.on{background:rgba(255,179,71,.1);border-color:var(--amber);color:var(--amber)}
.ep-section{display:none}.ep-section.on{display:block}
.fgroup{margin-bottom:14px}
.fgroup label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;letter-spacing:.04em}
.fi{width:100%;padding:8px 10px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);outline:none;transition:.12s}
.fi:focus{border-color:var(--amber)}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fi-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{padding:8px 18px;border-radius:var(--rs);border:1px solid;font-size:13px;font-weight:500;transition:.12s}
.btn-amber{border-color:var(--amber);color:var(--amber);background:rgba(255,179,71,.1)}
.btn-amber:hover{background:rgba(255,179,71,.2)}
.btn-red{border-color:var(--red);color:var(--red);background:rgba(255,95,95,.1)}
.btn-red:hover{background:rgba(255,95,95,.2)}
.btn-teal{border-color:var(--teal);color:var(--teal);background:rgba(94,207,176,.1)}
.btn-teal:hover{background:rgba(94,207,176,.2)}
.btn-sm{padding:5px 11px;font-size:11px}
.ep-list{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;max-height:320px;overflow-y:auto}
.ep-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);font-size:12px}
.ep-item-text{flex:1;color:var(--text2);line-height:1.4}
.ep-del{background:none;border:none;color:var(--text4);font-size:16px;padding:0 2px;line-height:1;transition:.1s}
.ep-del:hover{color:var(--red)}
.ep-edit-inline{background:none;border:none;color:var(--text4);font-size:13px;padding:0 4px;line-height:1;transition:.1s}
.ep-edit-inline:hover{color:var(--amber)}
.divider{height:1px;background:var(--border);margin:16px 0}
.msg-ok{color:var(--teal);font-size:12px;padding:4px 0}
.msg-err{color:var(--red);font-size:12px;padding:4px 0}
.lec-old-toggle{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:13px;color:var(--text2)}
.toggle-wrap{position:relative;width:36px;height:20px;cursor:pointer}
.toggle-wrap input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:var(--bg4);border-radius:20px;border:1px solid var(--border2);transition:.2s}
.slider::before{content:'';position:absolute;width:14px;height:14px;left:2px;top:2px;background:var(--text3);border-radius:50%;transition:.2s}
.toggle-wrap input:checked+.slider{background:rgba(110,181,255,.15);border-color:var(--blue)}
.toggle-wrap input:checked+.slider::before{transform:translateX(16px);background:var(--blue)}

/* ── PASSWORD MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:28px;width:90%;max-width:320px}
.modal h3{font-size:15px;font-weight:500;margin-bottom:16px;color:var(--text)}
.modal-hint{font-size:12px;color:var(--text3);margin-bottom:14px;line-height:1.6}

/* scrollbar */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<!-- PASSWORD MODAL -->
<div class="modal-bg" id="pwModal">
<div class="modal">
  <h3>✏️ 편집 모드 잠금 해제</h3>
  <div class="modal-hint">비밀번호를 입력하세요.<br>처음 설정 시 원하는 번호로 자동 등록됩니다.</div>
  <div class="fgroup"><input class="fi" type="password" id="pwInput" placeholder="비밀번호" maxlength="20" onkeydown="if(event.key==='Enter')tryPw()"></div>
  <div id="pwMsg" style="font-size:12px;margin-bottom:12px"></div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-amber" onclick="tryPw()">확인</button>
    <button class="btn" style="border-color:var(--border2);color:var(--text3)" onclick="closePwModal()">취소</button>
  </div>
</div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">📚 2027 IMGO TF</div>
  <div class="hdr-right">
    <div class="dday" id="ddayBadge">D-?</div>
    <button class="theme-btn" id="themeToggleBtn" onclick="toggleTheme()" title="라이트/다크 전환">🌙</button>
    <button class="edit-btn" id="editToggleBtn" onclick="onEditToggle()">편집 모드</button>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="ntab on" onclick="goPage('schedule',this)">스터디 현황</button>
  <button class="ntab" onclick="goPage('lectures',this)">강의 목록</button>
  <button class="ntab" onclick="goPage('notice',this)">공지사항</button>
</nav>

<!-- ======= PAGE: SCHEDULE ======= -->
<div class="page on main" id="page-schedule">

  <!-- EDIT PANEL: SCHEDULE -->
  <div class="edit-panel" id="ep-schedule" style="display:none">
    <div class="ep-title">스터디 현황 편집</div>
    <div class="ep-tabs">
      <button class="eptab on" onclick="epTab('ep-add',this)">일정 추가</button>
      <button class="eptab" onclick="epTab('ep-timelog',this)">시간 기록</button>
      <button class="eptab" onclick="epTab('ep-settings',this)">텀 설정</button>
      <button class="eptab" onclick="epTab('ep-del-sched',this)">일정 삭제</button>
    </div>

    <div class="ep-section on" id="ep-add">
      <div class="fi-row3" style="margin-bottom:8px">
        <div class="fgroup" style="margin-bottom:0"><label>날짜 (예: 8/11)</label><input class="fi" id="ea-date" placeholder="8/11"></div>
        <div class="fgroup" style="margin-bottom:0"><label>요일</label>
          <select class="fi" id="ea-day">
            <option>월</option><option>화</option><option>수</option><option>목</option><option>금</option><option>토</option><option>일</option>
          </select></div>
        <div class="fgroup" style="margin-bottom:0"><label>텀</label>
          <select class="fi" id="ea-term"><option value="1">1st</option><option value="2">2nd</option><option value="3">3rd</option><option value="4">4th</option></select></div>
      </div>
      <div class="fi-row" style="margin-bottom:8px">
        <div class="fgroup" style="margin-bottom:0"><label>과목/내용</label><input class="fi" id="ea-subj" placeholder="국어 1~20"></div>
        <div class="fgroup" style="margin-bottom:0"><label>주차 라벨</label><input class="fi" id="ea-week" placeholder="1주차"></div>
      </div>
      <div class="fi-row" style="margin-bottom:12px">
        <div class="fgroup" style="margin-bottom:0"><label>시간 기록 (선택, 예: 2:30)</label><input class="fi" id="ea-time" placeholder="2:30"></div>
        <div class="fgroup" style="margin-bottom:0"><label>비고 (선택)</label><input class="fi" id="ea-note" placeholder="PASS / 재언 PASS 등"></div>
      </div>
      <button class="btn btn-amber" onclick="addScheduleItem()">+ 일정 추가</button>
      <div id="ea-msg" class="msg-ok" style="margin-top:8px"></div>
    </div>

    <div class="ep-section" id="ep-timelog">
      <div style="font-size:12px;color:var(--text3);margin-bottom:12px">기존 일정에 시간을 기록하거나 수정합니다.</div>
      <div class="fgroup"><label>텀 선택</label>
        <select class="fi" id="tl-term" onchange="renderTimelogList()"><option value="1">1st</option><option value="2">2nd</option><option value="3">3rd</option><option value="4">4th</option></select></div>
      <div class="ep-list" id="tl-list"></div>
    </div>

    <div class="ep-section" id="ep-settings">
      <div class="fgroup"><label>D-DAY 날짜 (YYYY-MM-DD)</label><input class="fi" id="set-dday" placeholder="2027-11-14"></div>
      <div class="fgroup"><label>텀 기간 표시</label>
        <div class="fi-row">
          <input class="fi" id="set-period-t" placeholder="텀 번호 (1~4)">
          <input class="fi" id="set-period-v" placeholder="예: 2025.08.11 ~ 09.22">
        </div>
      </div>
      <button class="btn btn-amber" onclick="saveSettings()" style="margin-right:8px">저장</button>
      <div id="set-msg" class="msg-ok" style="margin-top:8px"></div>
    </div>

    <div class="ep-section" id="ep-del-sched">
      <div class="fgroup"><label>텀 선택</label>
        <select class="fi" id="ds-term" onchange="renderDelSchedList()"><option value="1">1st</option><option value="2">2nd</option><option value="3">3rd</option><option value="4">4th</option></select></div>
      <div class="ep-list" id="ds-list"></div>
      <div id="ds-msg" class="msg-ok"></div>
    </div>
  </div>

  <div class="term-tabs" id="termTabs"></div>
  <div class="stats" id="statsRow"></div>
  <div class="cal-wrap"><div class="sec-title">2주 캘린더</div><div id="calGrid"></div></div>
  <div class="sec-title">전체 일정</div>
  <div id="scheduleList"></div>
</div>

<!-- ======= PAGE: LECTURES ======= -->
<div class="page main" id="page-lectures">

  <div class="edit-panel" id="ep-lectures" style="display:none">
    <div class="ep-title">강의 목록 편집</div>
    <div class="ep-tabs">
      <button class="eptab on" onclick="epTab('ep-lec-add',this)">강의 추가</button>
      <button class="eptab" onclick="epTab('ep-lec-subj',this)">과목 관리</button>
      <button class="eptab" onclick="epTab('ep-lec-del',this)">강의 삭제</button>
    </div>

    <div class="ep-section on" id="ep-lec-add">
      <div class="fi-row" style="margin-bottom:8px">
        <div class="fgroup" style="margin-bottom:0"><label>과목 선택</label>
          <select class="fi" id="la-subj" onchange="renderLecDelList()"></select></div>
        <div class="fgroup" style="margin-bottom:0"><label>강 번호 (예: 3강)</label><input class="fi" id="la-num" placeholder="3강"></div>
      </div>
      <div class="fgroup"><label>강의 제목</label><input class="fi" id="la-title" placeholder="국어 교수법 개요"></div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <label style="font-size:12px;color:var(--text3)">작년 강의 (구버전 표시)</label>
        <label class="toggle-wrap"><input type="checkbox" id="la-old"><span class="slider"></span></label>
      </div>
      <button class="btn btn-amber" onclick="addLecture()">+ 추가</button>

// ==================== PASSWORD ====================
function onEditToggle(){
  if(editMode){ editMode=false; refreshEditPanels(); document.getElementById('editToggleBtn').classList.remove('on'); return; }
  document.getElementById('pwModal').classList.add('on');
  document.getElementById('pwInput').value='';
  document.getElementById('pwMsg').textContent='';
  setTimeout(()=>document.getElementById('pwInput').focus(),100);
}
function tryPw(){
  const val = document.getElementById('pwInput').value.trim();
  if(!val){document.getElementById('pwMsg').style.color='var(--red)';document.getElementById('pwMsg').textContent='비밀번호를 입력해주세요.';return;}
  const stored = localStorage.getItem(PW_KEY);
  if(!stored){
    localStorage.setItem(PW_KEY, val);
    document.getElementById('pwMsg').style.color='var(--teal)';
    document.getElementById('pwMsg').textContent='✓ 비밀번호가 설정되었습니다.';
    setTimeout(()=>{ closePwModal(); activateEdit(); }, 700);
  } else if(stored === val){
    closePwModal(); activateEdit();
  } else {
    document.getElementById('pwMsg').style.color='var(--red)';
    document.getElementById('pwMsg').textContent='비밀번호가 틀렸습니다.';
    document.getElementById('pwInput').select();
  }
}
function closePwModal(){ document.getElementById('pwModal').classList.remove('on'); }
function activateEdit(){ editMode=true; document.getElementById('editToggleBtn').classList.add('on'); refreshEditPanels(); }
function refreshEditPanels(){
  ['ep-schedule','ep-lectures','ep-notice'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.style.display = editMode ? 'block' : 'none';
  });
  if(editMode){
    document.getElementById('set-dday').value = S.dday||'';
    renderTimelogList(); renderDelSchedList(); renderNoticeEditPanels(); renderSubjectManage(); renderLecDelList2();
  }
}

// ==================== D-DAY ====================
function updateDday(){
  const parts = (S.dday||'2026-11-08').split('-');
  const dd = new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.ceil((dd-today)/(864e5));
  const badge = document.getElementById('ddayBadge');
  badge.textContent = diff>0?'D-'+diff:diff===0?'D-DAY ★':'D+'+Math.abs(diff);
}

// ==================== STATS ====================
function buildStats(t){
  const td = S.schedule[t]||[];
  let total=0,done=0,totalMins=0;
  td.forEach(w=>w.items.forEach(it=>{
    if(it.date==='-')return; total++;
    if(it.time){done++;const p=it.time.split(':');totalMins+=parseInt(p[0])*60+parseInt(p[1]);}
  }));
  const h=Math.floor(totalMins/60),m=totalMins%60;
  const period = (S.termPeriods&&S.termPeriods[t])||'미정';
  document.getElementById('statsRow').innerHTML=`
    <div class="sc"><div class="sc-label">기간</div><div class="sc-val" style="font-size:11px;padding-top:5px;color:var(--text2);line-height:1.4">${period}</div><div class="sc-sub">&nbsp;</div></div>
    <div class="sc"><div class="sc-label">전체 회차</div><div class="sc-val">${total}</div><div class="sc-sub">회</div></div>
    <div class="sc"><div class="sc-label">기록 완료</div><div class="sc-val" style="color:var(--accent)">${done}</div><div class="sc-sub">/ ${total}</div></div>
    <div class="sc"><div class="sc-label">총 스터디 시간</div><div class="sc-val">${h}<span style="font-size:13px;color:var(--text3)">h</span>${m}<span style="font-size:13px;color:var(--text3)">m</span></div><div class="sc-sub">기록 기준</div></div>`;
}

const dotColors={월:'var(--accent)',수:'var(--blue)',금:'var(--purple)',일:'var(--amber)',토:'var(--red)',화:'var(--teal)',목:'var(--pink)'};
function buildCalendar(t){
  const today=new Date();today.setHours(0,0,0,0);
  const studyMap={};
  (S.schedule[t]||[]).forEach(w=>w.items.forEach(it=>{
    if(it.date==='-')return;
    const p=it.date.split('/');
    const yr= parseInt(p[0])>=8?2025:2026;
    const key=`${yr}-${parseInt(p[0])-1}-${parseInt(p[1])}`;
    studyMap[key]={subject:it.subject,time:it.time};
  }));
  const start=new Date(today);
  const dow=start.getDay();
  start.setDate(start.getDate()+(dow===0?-6:1-dow));
  const dayL=['월','화','수','목','금','토','일'];
  let html='<div class="cal-grid">';
  dayL.forEach(l=>html+=`<div class="cal-hd">${l}</div>`);
  for(let i=0;i<14;i++){
    const d=new Date(start);d.setDate(d.getDate()+i);
    const key=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    const isT=d.getTime()===today.getTime();
    const info=studyMap[key];
    let cls='cc'+(isT?' today':info?' sday':'');
    html+=`<div class="${cls}"><div class="cd">${d.getMonth()+1}/${d.getDate()}</div>`;
    if(info){
      const sh=info.subject.length>10?info.subject.slice(0,9)+'…':info.subject;
      html+=`<div class="cc-sub">${sh}</div>`;
      if(info.time)html+=`<div class="cc-time">${info.time}</div>`;
    }
    html+='</div>';
  }
  html+='</div>';
  document.getElementById('calGrid').innerHTML=html;
}

// ==================== SCHEDULE LIST ====================
function buildSchedule(t){
  const td=S.schedule[t]||[];
  let html='';
  const today=new Date();today.setHours(0,0,0,0);
  td.forEach(w=>{
    html+=`<div class="wdiv">— ${w.week}</div>`;
    w.items.forEach(it=>{
      if(it.date==='-'){html+=`<div class="sr"><div class="sr-sub" style="color:var(--text3);grid-column:1/-1">${it.subject}</div></div>`;return;}
      const dc=dotColors[it.day]||'var(--teal)';
      const timeH=it.time?`<div class="sr-time">[${it.time}]</div>`:it.note?`<div class="sr-time pass">${it.note}</div>`:`<div class="sr-time pass">—</div>`;
      const noteH=it.note&&it.time?`<span class="sr-note"> · ${it.note}</span>`:'';
      html+=`<div class="sr"><div class="sr-date"><span class="dot" style="background:${dc}"></span>${it.date}<span class="sr-day">(${it.day})</span></div><div class="sr-sub">${it.subject}${noteH}</div>${timeH}</div>`;
    });
  });
  document.getElementById('scheduleList').innerHTML=html||'<div style="color:var(--text3);padding:20px 0;font-size:13px">일정이 없습니다.</div>';
}

// ==================== TERM SWITCH ====================
function showTerm(n){
  currentTerm=n;
  document.querySelectorAll('.ttab').forEach((t,i)=>t.classList.toggle('on',i+1===n));
  buildStats(n);buildCalendar(n);buildSchedule(n);
  if(editMode){renderTimelogList();renderDelSchedList();}
}
function buildTermTabs(){
  document.getElementById('termTabs').innerHTML=[1,2,3,4].map((n,i)=>`<button class="ttab${i===0?' on':''}" onclick="showTerm(${n})">${n===1?'1st':n===2?'2nd':n===3?'3rd':'4th'} Term</button>`).join('');
}

// ==================== ADD SCHEDULE ====================
function addScheduleItem(){
  const date=document.getElementById('ea-date').value.trim();
  const day=document.getElementById('ea-day').value;
  const t=parseInt(document.getElementById('ea-term').value);
  const subj=document.getElementById('ea-subj').value.trim();
  const week=document.getElementById('ea-week').value.trim()||'추가';
  const time=document.getElementById('ea-time').value.trim();
  const note=document.getElementById('ea-note').value.trim();
  const msg=document.getElementById('ea-msg');
  if(!date||!subj){msg.style.color='var(--red)';msg.textContent='날짜와 내용은 필수입니다.';return;}
  if(!S.schedule[t])S.schedule[t]=[];
  let wk=S.schedule[t].find(w=>w.week===week);
  if(!wk){wk={week,items:[]};S.schedule[t].push(wk);}
  const item={date,day,subject:subj};
  if(time)item.time=time;
  if(note)item.note=note;
  wk.items.push(item);
  saveData();
  if(t===currentTerm){buildStats(t);buildCalendar(t);buildSchedule(t);}
  msg.style.color='var(--teal)';msg.textContent='✓ 추가되었습니다.';
  ['ea-date','ea-subj','ea-time','ea-note'].forEach(id=>document.getElementById(id).value='');
  setTimeout(()=>msg.textContent='',2000);
  if(editMode){renderTimelogList();renderDelSchedList();}
}

// ==================== TIMELOG ====================
function renderTimelogList(){
  const t=parseInt(document.getElementById('tl-term').value);
  const td=S.schedule[t]||[];
  let html='';
  td.forEach((w,wi)=>w.items.forEach((it,ii)=>{
    if(it.date==='-')return;
    const curTime=it.time||'';
    html+=`<div class="ep-item">
      <div class="ep-item-text">${it.date}(${it.day}) ${it.subject}</div>
      <input class="fi" style="width:72px;padding:4px 6px;font-size:12px" value="${curTime}" placeholder="2:30" id="tl-${t}-${wi}-${ii}" onchange="saveTimeLog(${t},${wi},${ii},this.value)">
    </div>`;
  }));
  document.getElementById('tl-list').innerHTML=html||'<div style="color:var(--text3);font-size:12px;padding:8px 0">일정이 없습니다.</div>';
}
function saveTimeLog(t,wi,ii,val){
  const v=val.trim();
  if(v) S.schedule[t][wi].items[ii].time=v;
  else delete S.schedule[t][wi].items[ii].time;
  saveData();
  if(t===currentTerm){buildStats(t);buildCalendar(t);buildSchedule(t);}
}

// ==================== DEL SCHEDULE ====================
function renderDelSchedList(){
  const t=parseInt(document.getElementById('ds-term').value);
  const td=S.schedule[t]||[];
  let html='';
  td.forEach((w,wi)=>w.items.forEach((it,ii)=>{
    html+=`<div class="ep-item"><div class="ep-item-text">${it.date}(${it.day}) ${it.subject}</div><button class="ep-del" onclick="delSchedItem(${t},${wi},${ii})">×</button></div>`;
  }));
  document.getElementById('ds-list').innerHTML=html||'<div style="color:var(--text3);font-size:12px;padding:8px 0">일정이 없습니다.</div>';
}
function delSchedItem(t,wi,ii){
  S.schedule[t][wi].items.splice(ii,1);
  if(S.schedule[t][wi].items.length===0)S.schedule[t].splice(wi,1);
  saveData();
  if(t===currentTerm){buildStats(t);buildCalendar(t);buildSchedule(t);}
  renderDelSchedList();renderTimelogList();
}

// ==================== SETTINGS ====================
function saveSettings(){
  const dday=document.getElementById('set-dday').value.trim();
  const pt=document.getElementById('set-period-t').value.trim();
  const pv=document.getElementById('set-period-v').value.trim();
  if(dday)S.dday=dday;
  if(pt&&pv){if(!S.termPeriods)S.termPeriods={};S.termPeriods[parseInt(pt)]=pv;}
  saveData();updateDday();buildStats(currentTerm);
  const msg=document.getElementById('set-msg');msg.style.color='var(--teal)';msg.textContent='✓ 저장되었습니다.';
  setTimeout(()=>msg.textContent='',2000);
}

// ==================== LECTURES ====================
function buildSubjectTabs(){
  const subjects=Object.keys(S.lectures||{});
  if(!subjects.length)return;
  if(!currentSubject||!S.lectures[currentSubject])currentSubject=subjects[0];
  const tabsEl=document.getElementById('subjectTabs');
  const selEl=document.getElementById('la-subj');
  const selEl2=document.getElementById('ld-subj');
  tabsEl.innerHTML=subjects.map(s=>`<button class="stab${s===currentSubject?' on':''}" onclick="showSubject('${s}',this)">${s}</button>`).join('');
  if(selEl)selEl.innerHTML=subjects.map(s=>`<option value="${s}">${s}</option>`).join('');
  if(selEl2)selEl2.innerHTML=subjects.map(s=>`<option value="${s}">${s}</option>`).join('');
  renderLectures();
}
function showSubject(name,btn){
  if(btn){document.querySelectorAll('.stab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');}
  currentSubject=name;renderLectures();
}
function renderLectures(){
  const showOld=document.getElementById('showOld')?.checked!==false;
  const lecs=S.lectures[currentSubject]||[];
  const visibleLecs=lecs.filter(l=>showOld||!l.old);
  let html='';
  visibleLecs.forEach(l=>{
    html+=`<div class="li${l.old?' old':''}"><span class="lnum">${l.num}</span><span class="ltitle">${l.title}${l.old?'<span class="old-badge">작년</span>':''}</span></div>`;
  });
  document.getElementById('lectureList').innerHTML=html||'<div style="color:var(--text3);font-size:13px;padding:12px 0">강의가 없습니다.</div>';
}
function addLecture(){
  const subj=document.getElementById('la-subj').value;
  const num=document.getElementById('la-num').value.trim();
  const title=document.getElementById('la-title').value.trim();
  const isOld=document.getElementById('la-old').checked;
  const msg=document.getElementById('la-msg');
  if(!subj||!title){msg.style.color='var(--red)';msg.textContent='과목과 제목은 필수입니다.';return;}
  if(!S.lectures[subj])S.lectures[subj]=[];
  S.lectures[subj].push({num:num||'-',title,old:isOld});
  saveData();
  if(subj===currentSubject)renderLectures();
  renderLecDelList2();
  msg.style.color='var(--teal)';msg.textContent='✓ 추가되었습니다.';
  document.getElementById('la-num').value='';document.getElementById('la-title').value='';document.getElementById('la-old').checked=false;
  setTimeout(()=>msg.textContent='',2000);
}
function addSubject(){
  const name=document.getElementById('ls-name').value.trim();
  if(!name)return;
  if(!S.lectures[name])S.lectures[name]=[];
  saveData();buildSubjectTabs();renderSubjectManage();
  document.getElementById('ls-name').value='';
}
function renderSubjectManage(){
  const subjects=Object.keys(S.lectures||{});
  document.getElementById('ls-list').innerHTML=subjects.map((s,i)=>`<div class="ep-item"><div class="ep-item-text">${s}</div><button class="ep-del" onclick="delSubject('${s}')">×</button></div>`).join('');
}
function delSubject(name){
  if(!confirm(`'${name}' 과목을 삭제할까요? 강의 목록도 함께 삭제됩니다.`))return;
  delete S.lectures[name];
  if(currentSubject===name)currentSubject='';
  saveData();buildSubjectTabs();renderSubjectManage();
}
function renderLecDelList2(){
  const subj=document.getElementById('ld-subj')?.value;
  if(subj)renderLecDelListFor(subj,'ld-list');
}
function renderLecDelListFor(subj,listId){
  const lecs=S.lectures[subj]||[];
  document.getElementById(listId).innerHTML=lecs.map((l,i)=>`<div class="ep-item"><div class="ep-item-text">${l.num} ${l.title}${l.old?' (작년)':''}</div><button class="ep-del" onclick="delLecture('${subj}',${i})">×</button></div>`).join('')||'<div style="color:var(--text3);font-size:12px">강의가 없습니다.</div>';
}
function delLecture(subj,i){
  S.lectures[subj].splice(i,1);
  saveData();if(subj===currentSubject)renderLectures();renderLecDelList2();
}

// ==================== NOTICE ====================
function renderNoticeView(){
  let sh='';
  (S.notice.schedule||[]).forEach(r=>{sh+=`<div class="nr"><span class="nl">${r.day}</span><span class="nv a">${r.time}</span></div>`;});
  document.getElementById('nt-sched-view').innerHTML=sh;
  let fh='';
  (S.notice.fines||[]).forEach(f=>{
    const col=f.amount>=50000?'var(--red)':'var(--amber)';
    fh+=`<div class="fine-row"><div class="fine-icon" style="background:${f.amount>=50000?'rgba(255,95,95,.15)':'rgba(255,179,71,.15)'}">💸</div><div class="fine-name">${f.name}</div><div class="fine-amt" style="color:${col}">${f.amount.toLocaleString()}원</div></div>`;
  });
  document.getElementById('nt-fine-view').innerHTML=fh;
  let lh='';
  (S.notice.links||[]).forEach(l=>{lh+=`<a class="link-card" href="${l.url}" target="_blank"><div><div class="link-title">${l.title}</div><div class="link-url">${l.url.replace(/https?:\/\//,'').split('/')[0]}</div></div><div class="link-arr">↗</div></a>`;});
  document.getElementById('nt-link-view').innerHTML=lh;
}
function renderNoticeEditPanels(){
  document.getElementById('nt-sched-list').innerHTML=(S.notice.schedule||[]).map((r,i)=>`<div class="ep-item"><div class="ep-item-text">${r.day} · ${r.time}</div><button class="ep-del" onclick="delNoticeItem('schedule',${i})">×</button></div>`).join('');
  document.getElementById('nt-fine-list').innerHTML=(S.notice.fines||[]).map((f,i)=>`<div class="ep-item"><div class="ep-item-text">${f.name} · ${f.amount.toLocaleString()}원</div><button class="ep-del" onclick="delNoticeItem('fines',${i})">×</button></div>`).join('');
  document.getElementById('nt-link-list').innerHTML=(S.notice.links||[]).map((l,i)=>`<div class="ep-item"><div class="ep-item-text">${l.title}</div><button class="ep-del" onclick="delNoticeItem('links',${i})">×</button></div>`).join('');
}
function delNoticeItem(type,i){S.notice[type].splice(i,1);saveData();renderNoticeView();renderNoticeEditPanels();}
function addSchedRow(){
  const day=document.getElementById('ns-day').value.trim();
  const time=document.getElementById('ns-time').value.trim();
  if(!day||!time)return;
  if(!S.notice.schedule)S.notice.schedule=[];
  S.notice.schedule.push({day,time});saveData();renderNoticeView();renderNoticeEditPanels();
  document.getElementById('ns-day').value='';document.getElementById('ns-time').value='';
}
function addFine(){
  const name=document.getElementById('fn-name').value.trim();
  const amt=parseInt(document.getElementById('fn-amt').value)||0;
  if(!name)return;
  if(!S.notice.fines)S.notice.fines=[];
  S.notice.fines.push({name,amount:amt});saveData();renderNoticeView();renderNoticeEditPanels();
  document.getElementById('fn-name').value='';document.getElementById('fn-amt').value='';
}
function addLink(){
  const title=document.getElementById('lk-title').value.trim();
  const url=document.getElementById('lk-url').value.trim();
  if(!title||!url)return;
  if(!S.notice.links)S.notice.links=[];
  S.notice.links.push({title,url});saveData();renderNoticeView();renderNoticeEditPanels();
  document.getElementById('lk-title').value='';document.getElementById('lk-url').value='';
}

// ==================== PAGE NAV ====================
function goPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  if(name==='lectures')buildSubjectTabs();
}

// ==================== THEME ====================
function toggleTheme(){
  const isLight = document.body.classList.toggle('light');
  document.getElementById('themeToggleBtn').textContent = isLight ? '🌞' : '🌙';
  localStorage.setItem('imgo_theme', isLight ? 'light' : 'dark');
}
(function initTheme(){
  if(localStorage.getItem('imgo_theme')==='light'){
    document.body.classList.add('light');
    const btn = document.getElementById('themeToggleBtn');
    if(btn) btn.textContent = '🌞';
  }
})();

// ==================== INIT ====================
(async()=>{
  await loadData();
  updateDday();
  buildTermTabs();
  showTerm(1);
  renderNoticeView();
  buildSubjectTabs();
})();
</script>
</body>
</html>
